name: Release Golden Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_ORG: escape-velocity-ventures
  GITEA_REGISTRY: git.escape-velocity-ventures.org
  GITEA_ORG: ev

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Gitea registry
        run: |
          echo "${{ secrets.GITEA_TOKEN }}" | docker login "${{ env.GITEA_REGISTRY }}" \
            -u "${{ secrets.GITEA_USERNAME }}" --password-stdin

      # ── Orchestrator image (Dockerfile.golden) ─────────────────────────
      - name: Build and push orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile.golden
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}/nanoclaw:${{ inputs.version }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}/nanoclaw:latest
            ${{ env.GITEA_REGISTRY }}/${{ env.GITEA_ORG }}/nanoclaw:${{ inputs.version }}
            ${{ env.GITEA_REGISTRY }}/${{ env.GITEA_ORG }}/nanoclaw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Agent image (Dockerfile) ──────────────────────────────────────
      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}/nanoclaw-agent:${{ inputs.version }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}/nanoclaw-agent:latest
            ${{ env.GITEA_REGISTRY }}/${{ env.GITEA_ORG }}/nanoclaw-agent:${{ inputs.version }}
            ${{ env.GITEA_REGISTRY }}/${{ env.GITEA_ORG }}/nanoclaw-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: NanoClaw Golden Image v${{ inputs.version }}
          body: |
            ## NanoClaw Golden Image v${{ inputs.version }}

            Container images published to:
            - `ghcr.io/escape-velocity-ventures/nanoclaw:${{ inputs.version }}`
            - `ghcr.io/escape-velocity-ventures/nanoclaw-agent:${{ inputs.version }}`
            - `git.escape-velocity-ventures.org/ev/nanoclaw:${{ inputs.version }}`
            - `git.escape-velocity-ventures.org/ev/nanoclaw-agent:${{ inputs.version }}`

            Platforms: `linux/amd64`, `linux/arm64`
          generate_release_notes: true
